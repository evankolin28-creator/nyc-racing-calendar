<style>
:root{
  --ink:#171717;--muted:#6b7280;--line:#e7e5e4;--soft:#fafaf9;--soft2:#f5f5f4;--accent:#0f766e;--shadow:0 20px 60px rgba(17,24,39,.08);
}
*{box-sizing:border-box} body{margin:0;background:#f7f5f0;color:var(--ink);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;line-height:1.45}.page{max-width:1180px;margin:0 auto;padding:28px 18px 48px}.card{background:#fff;border:1px solid var(--line);border-radius:28px;box-shadow:var(--shadow);overflow:hidden}.hero{padding:30px 32px 22px;border-top:7px solid var(--accent);background:linear-gradient(180deg,#fff,#fffdf8)}h1{margin:0 0 8px;font-size:clamp(34px,5vw,58px);line-height:.95;letter-spacing:-.06em;font-weight:950}.deck{max-width:760px;margin:0;color:#4b5563;font-size:16px}.updated{margin-top:14px;color:#78716c;font-size:13px;font-weight:750}.follow-note{
    margin-top:10px;
    color:#78716c;
    font-size:13px;
    line-height:1.5;
    max-width:700px;
}

.follow-note a{
    color:var(--accent);
    font-weight:700;
    text-decoration:none;
}

.follow-note a:hover{
    text-decoration:underline;
}.controls{padding:18px 22px 22px;border-top:1px solid #f1efeb;border-bottom:1px solid var(--line);background:#fff}.filter-grid{display:grid;grid-template-columns:minmax(220px,1.6fr) minmax(245px,1.25fr) minmax(120px,.85fr) minmax(150px,.9fr) minmax(140px,.9fr);gap:12px;align-items:end}.field label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.09em;color:#78716c;font-weight:900;margin:0 0 5px}.field input,.field select{width:100%;border:1px solid #d7d3cc;border-radius:14px;background:#fff;padding:11px 12px;font:inherit;font-size:14px;color:#1f2937}.field input:focus,.field select:focus{outline:3px solid rgba(15,118,110,.14);border-color:var(--accent)}#organizer{padding-right:34px;}.quick{margin-top:14px;display:flex;gap:8px;flex-wrap:wrap}.chip{border:1.5px solid var(--chip,#cbd5e1);background:color-mix(in srgb,var(--chip,#64748B) 9%,#fff);color:var(--chip,#475569);border-radius:999px;padding:6px 10px;font-size:12px;font-weight:900;cursor:pointer}.chip:hover,.chip.active{background:var(--chip,#64748B);color:#fff}.chip.active{box-shadow:0 0 0 3px color-mix(in srgb,var(--chip,#64748B) 22%,transparent);transform:translateY(-1px)}.chip.all{--chip:#171717}.chip.all.active,.chip.all:hover{background:#171717;color:#fff}.chip.yellow{color:#111827}.chip.yellow:hover,.chip.yellow.active{color:#111827;background:#F4C430}.nav{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:20px 24px;background:#fff}.nav button{appearance:none;border:1px solid #d7d3cc;background:#fff;border-radius:999px;padding:10px 14px;font-weight:900;cursor:pointer;color:#1f2937}.nav button:hover{border-color:var(--accent);color:var(--accent)}.nav button:disabled{visibility:hidden;pointer-events:none}.month-title{text-align:center}.month-title h2{margin:0;font-size:28px;letter-spacing:-.04em}.summary{font-size:13px;color:#78716c;font-weight:750;margin-top:3px}.calendar-wrap{padding:0 24px 28px}.weekdays{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-bottom:8px}.weekday{text-align:center;color:#78716c;text-transform:uppercase;letter-spacing:.08em;font-size:11px;font-weight:950}.grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}.day{min-height:142px;background:#fff;border:1px solid var(--line);border-radius:18px;padding:10px 9px;position:relative;transition:.15s box-shadow,.15s transform}.day.weekend{background:#fcfcfb}.day.out{background:#f3f1ed;color:#a8a29e}.day.today{outline:3px solid rgba(15,118,110,.22);border-color:var(--accent)}.day.has-events{cursor:pointer}.day.has-events:hover{box-shadow:0 12px 28px rgba(17,24,39,.10);transform:translateY(-1px);z-index:2}.date-num{font-weight:950;font-size:13px;margin-bottom:8px}.event{position:relative;display:block;text-decoration:none;color:inherit;background:#fff;border:1px solid #ece9e4;border-left:4px solid var(--org,#94a3b8);border-radius:12px;padding:7px 7px 8px;margin:0 0 7px;box-shadow:0 1px 0 rgba(17,24,39,.03)}.event:hover{border-color:#d6d3d1;box-shadow:0 6px 16px rgba(17,24,39,.08)}.org-pill{display:inline-flex;align-items:center;border:1.5px solid var(--org,#64748B);background:color-mix(in srgb,var(--org,#64748B) 12%,#fff);color:var(--org,#64748B);border-radius:999px;padding:2px 7px;font-size:10px;line-height:1.1;font-weight:950;letter-spacing:.02em;white-space:nowrap;margin:0 0 5px}.org-pill.yellow{color:#111827}.race-name{font-size:12px;font-weight:850;line-height:1.25}.meta-row{display:flex;gap:4px;flex-wrap:wrap;margin-top:5px}.tag{display:inline-flex;border:1px solid #e5e7eb;background:#f9fafb;color:#4b5563;border-radius:999px;padding:1px 6px;font-size:10px;font-weight:850}.tag.status{background:#fff7ed;border-color:#fdba74;color:#9a3412}.more{border:0;background:#f5f5f4;color:#57534e;border-radius:999px;padding:5px 8px;font-size:11px;font-weight:950;cursor:pointer}.empty{padding:30px 24px 42px;text-align:center;color:#78716c}.modal{position:fixed;inset:0;display:none;z-index:1000}.modal.open{display:block}.backdrop{position:absolute;inset:0;background:rgba(17,24,39,.42)}.panel{position:absolute;right:18px;top:18px;bottom:18px;width:min(460px,calc(100% - 36px));background:#fff;border-radius:24px;box-shadow:0 30px 80px rgba(0,0,0,.25);display:flex;flex-direction:column;overflow:hidden}.panel-head{padding:20px 20px 16px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;gap:16px}.panel-title{font-size:22px;font-weight:950;letter-spacing:-.04em}.panel-sub{color:#78716c;font-weight:750;font-size:13px;margin-top:2px}.close{border:1px solid #d6d3d1;background:#fff;border-radius:999px;width:36px;height:36px;font-size:20px;line-height:1;cursor:pointer}.panel-body{padding:16px 18px;overflow:auto}.detail{border:1px solid #ece9e4;border-left:5px solid var(--org,#94a3b8);border-radius:18px;padding:14px;margin-bottom:12px}.detail h3{margin:5px 0 8px;font-size:18px;line-height:1.15;letter-spacing:-.03em}.detail p{margin:5px 0;color:#57534e;font-size:14px}.register{display:inline-block;margin-top:10px;background:#171717;color:#fff;text-decoration:none;border-radius:999px;padding:9px 12px;font-weight:900;font-size:13px}.register:hover{background:#0f766e}.footer-note{padding:0 24px 28px;color:#78716c;font-size:12px}.visually-hidden{position:absolute;clip:rect(0 0 0 0);clip-path:inset(50%);height:1px;overflow:hidden;white-space:nowrap;width:1px}
@media (max-width:900px){.filter-grid{grid-template-columns:1fr 1fr}.field.search{grid-column:1/-1}.day{min-height:118px;padding:8px 6px}.race-name{font-size:11px}.calendar-wrap{padding:0 12px 20px}.nav{padding:16px 14px}.hero{padding:24px 22px 18px}.controls{padding:16px 14px}.grid,.weekdays{gap:5px}.weekday{font-size:10px}}
@media (max-width:640px){
  .page{padding:10px 8px 28px}
  .card{border-radius:20px}
  .filter-grid{grid-template-columns:1fr}
  .nav{align-items:stretch}
  .nav button{font-size:0;padding:10px 12px}
  .nav button:first-child:after{content:'←';font-size:18px}
  .nav button:last-child:after{content:'→';font-size:18px}
  .month-title h2{font-size:23px}

  .weekdays{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:4px;
    margin-bottom:4px;
  }

  .weekday{font-size:9px}

  .grid{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:4px;
  }

  .day{
    min-height:58px;
    margin-bottom:0;
    border-radius:10px;
    padding:5px 4px;
  }

  .day.out{display:block}

  .date-num{
    font-size:11px;
    margin-bottom:4px;
  }

  .event{
    height:6px;
    min-height:0;
    padding:0;
    margin:2px 0;
    border-radius:999px;
    border:0;
    background:var(--org,#94a3b8);
    box-shadow:none;
    overflow:hidden;
  }

  .event .org-pill,
  .event .race-name,
  .event .meta-row{
    display:none;
  }

  .more{
    font-size:0;
    width:6px;
    height:6px;
    padding:0;
    border-radius:999px;
    background:#57534e;
  }

  .more::after{content:''}

  .panel{
    left:8px;
    right:8px;
    top:8px;
    bottom:8px;
    width:auto;
    border-radius:20px;
  }
}
</style>
</head>

<div class="page">

    <header class="hero">

      <div class="updated">Last Updated: <span id="lastUpdated"></span></div>

    <section class="controls" aria-label="Calendar filters">

      </div>
    </section>
    <section class="nav" aria-label="Month navigation">

      <div class="month-title"><h2 id="monthTitle"></h2><div class="summary" id="monthSummary"></div></div>
      <button id="nextMonth" type="button">Next →</button>

    <main class="calendar-wrap">

      <div class="empty" id="empty" hidden>No races match the current filters.</div>
    </main>
    <div class="footer-note">Select race names for official race details and registration.</div>
  </div>
</div>
<div class="modal" id="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
  <div class="backdrop" data-close></div>

    <div class="panel-body" id="modalBody"></div>
  </aside>
</div>

  function opt(select,items,allLabel){select.innerHTML=''; const o=document.createElement('option'); o.value=''; o.textContent=allLabel; select.appendChild(o); items.forEach(v=>{const x=document.createElement('option');x.value=v;x.textContent=(select===els.distance&&v==='Half')?'Half Marathon':v;select.appendChild(x);});}
  opt(els.organizer,[...sortOrganizers(events.map(e=>e.organizer)),'Other'],'All organizers');
  function locationTokens(v){return (v||'').split(/\s*\/\s*|\s*,\s*/).map(x=>x.trim()).filter(Boolean);}
  opt(els.borough,sortLocations(events.flatMap(e=>locationTokens(e.borough))),'All locations');
  opt(els.distance,sortDistances(events.flatMap(e=>e.distance.split('/').map(s=>s.trim()))),'All distances');
  els.month.innerHTML='<option value="">All months</option>'+allMonths.map(m=>`<option value="${m}">${monthFmt.format(new Date(m+'-01T12:00:00'))}</option>`).join('');
  function filters(){return {q:els.search.value.trim().toLowerCase(),org:els.organizer.value,mon:els.month.value,dist:els.distance.value,bor:els.borough.value};}
  function filtered(){const f=filters();return events.filter(e=>{const hay=[e.name,e.organizer,e.location,e.borough,e.distance,e.status].join(' ').toLowerCase();const orgMatch=!f.org||(f.org==='Other'?(!isMajorOrganizer(e.organizer)):e.organizer===f.org);return (!f.q||hay.includes(f.q))&&orgMatch&&(!f.mon||e.date.startsWith(f.mon))&&(!f.bor||locationTokens(e.borough).includes(f.bor))&&(!f.dist||e.distance.split('/').map(s=>s.trim()).includes(f.dist));});}
  function monthEvents(all){return all.filter(e=>e.date.startsWith(currentMonth));}
  function eventNode(e,compact=true){const a=document.createElement('a');a.className='event';a.href=e.registrationUrl||'#';a.target='_blank';a.rel='noopener';a.style.setProperty('--org',e.color||'#64748B');a.addEventListener('click',ev=>ev.stopPropagation());
    if(e.organizer){const pill=document.createElement('span');pill.className='org-pill'+(e.organizer==='Queens Distance Runners'?' yellow':'');pill.style.setProperty('--org',e.color||'#64748B');pill.textContent=e.organizer;a.appendChild(pill);}
    const name=document.createElement('div');name.className='race-name';name.textContent=e.name;a.appendChild(name);
    const meta=document.createElement('div');meta.className='meta-row';const loc=e.location||e.borough;if(loc){const t=document.createElement('span');t.className='tag';t.textContent=loc;meta.appendChild(t);}if(['Sold Out','Registration Closed','Open to Public 7/7'].includes(e.status)){const s=document.createElement('span');s.className='tag status';s.textContent=e.status;meta.appendChild(s);}a.appendChild(meta);return a;}
  function openDay(dateStr,items){const d=new Date(dateStr+'T12:00:00');els.modalTitle.textContent=dayFmt.format(d);els.modalSub.textContent=items.length+' '+(items.length===1?'race':'races');els.modalBody.innerHTML='';items.forEach(e=>{const box=document.createElement('div');box.className='detail';box.style.setProperty('--org',e.color||'#64748B');if(e.organizer){const pill=document.createElement('span');pill.className='org-pill'+(e.organizer==='Queens Distance Runners'?' yellow':'');pill.style.setProperty('--org',e.color||'#64748B');pill.textContent=e.organizer;box.appendChild(pill);}const h=document.createElement('h3');h.textContent=e.name;box.appendChild(h);const p1=document.createElement('p');p1.textContent=[e.distance,e.location,e.borough].filter(Boolean).join(' • ');box.appendChild(p1);if(e.notes){const p2=document.createElement('p');p2.textContent=e.notes;box.appendChild(p2);}if(['Sold Out','Registration Closed','Open to Public 7/7'].includes(e.status)){const p3=document.createElement('p');p3.innerHTML='<strong>Status:</strong> '+e.status;box.appendChild(p3);}if(e.registrationUrl){const reg=document.createElement('a');reg.className='register';reg.href=e.registrationUrl;reg.target='_blank';reg.rel='noopener';reg.textContent='Register / details';box.appendChild(reg);}els.modalBody.appendChild(box);});els.modal.classList.add('open');}
  function render(){const all=filtered(); const targetMonth=els.month.value||currentMonth; if(allMonths.includes(targetMonth)) currentMonth=targetMonth; els.month.value=els.month.value||''; const date=new Date(currentMonth+'-01T12:00:00'); els.title.textContent=monthFmt.format(date); const byDate={}; monthEvents(all).forEach(e=>(byDate[e.date]||(byDate[e.date]=[])).push(e)); const count=Object.values(byDate).flat().length; els.summary.textContent=count?`${count} matching ${count===1?'race':'races'} this month`:'No matching races this month';els.prev.disabled=(allMonths.indexOf(currentMonth)<=0);els.next.disabled=(allMonths.indexOf(currentMonth)>=allMonths.length-1); els.grid.innerHTML='';
    const y=date.getFullYear(),m=date.getMonth(); const first=new Date(y,m,1); const start=new Date(first); start.setDate(1-first.getDay()); const last=new Date(y,m+1,0); const end=new Date(last); end.setDate(last.getDate()+(6-last.getDay())); let any=false;
    for(let d=new Date(start); d<=end; d.setDate(d.getDate()+1)){const yyyy=d.getFullYear(), mm=String(d.getMonth()+1).padStart(2,'0'), dd=String(d.getDate()).padStart(2,'0'); const ds=`${yyyy}-${mm}-${dd}`; const items=(byDate[ds]||[]).sort((a,b)=>(a.sortOrder??999)-(b.sortOrder??999)||a.name.localeCompare(b.name)); if(items.length) any=true; const cell=document.createElement('div'); cell.className='day'+(d.getMonth()!==m?' out':'')+((d.getDay()===0||d.getDay()===6)?' weekend':'')+(items.length?' has-events':''); const today=new Date(); if(ds===`${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`) cell.className+=' today'; const dn=document.createElement('div');dn.className='date-num';dn.textContent=d.getDate();cell.appendChild(dn); items.slice(0,3).forEach(e=>cell.appendChild(eventNode(e,true))); if(items.length>3){const more=document.createElement('button');more.type='button';more.className='more';more.textContent=`+${items.length-3} more`;more.addEventListener('click',ev=>{ev.stopPropagation();openDay(ds,items);});cell.appendChild(more);} if(items.length) cell.addEventListener('click',()=>openDay(ds,items)); els.grid.appendChild(cell);} els.empty.hidden=any||all.length>0; }
  [els.search,els.organizer,els.month,els.distance,els.borough].forEach(el=>el.addEventListener('input',()=>{if(el===els.month&&els.month.value)currentMonth=els.month.value;render();}));
  els.prev.addEventListener('click',()=>{let i=allMonths.indexOf(currentMonth); if(i>0){currentMonth=allMonths[i-1];els.month.value='';render();}}); els.next.addEventListener('click',()=>{let i=allMonths.indexOf(currentMonth); if(i<allMonths.length-1){currentMonth=allMonths[i+1];els.month.value='';render();}});
  document.querySelectorAll('[data-close]').forEach(x=>x.addEventListener('click',()=>els.modal.classList.remove('open'))); document.addEventListener('keydown',e=>{if(e.key==='Escape')els.modal.classList.remove('open')});
  render();
})();
</script>
</body>
</html>
